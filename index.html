<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cascada de letras — Jhannara</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 20%, #0a0500 0%, #000000 70%);
    overflow: hidden;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<canvas id="cascada"></canvas>

<script>
/* =======================================================
   👉 PON AQUÍ TUS LETRAS / PALABRAS 👈
   Puedes escribir letras sueltas ("A","B","C")
   o frases completas ("JHANNARA MI VIDA", "JHANNARA TE AMO").
   El programa elige una al azar para cada columna.
======================================================= */
const SIMBOLOS = [
  " JHANNARA MI VIDA",
  " JHANNARA MI AMOR",
  " JHANNARA MI CIELO",
  " JHANNARA MI TODO",
  " JHANNARA MI CORAZON",
  " JHANNARA TE AMO"
];

/* ======================================================= */

const canvas = document.getElementById("cascada");
const ctx = canvas.getContext("2d");

function ajustarTamano() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  inicializarColumnas();
}

const tamanoFuente = 22;
const espacioColumnas = 28;

let gotas = [];

function elegirFrase() {
  return SIMBOLOS[Math.floor(Math.random() * SIMBOLOS.length)];
}

// Paleta dorado/ámbar: cada gota tiene su propio matiz para que la cascada
// no se vea plana, sino con variación de calidez (oro, ámbar, miel, casi blanco).
const PALETA = [
  { cabeza: "#FFFFFF", cola: "255, 230, 130" },
  { cabeza: "#FFF6D8", cola: "255, 221, 90"  },
  { cabeza: "#FFE9A8", cola: "255, 196, 60"  },
  { cabeza: "#FFD86B", cola: "255, 178, 40"  },
  { cabeza: "#FFCB4D", cola: "255, 160, 20"  }
];

function crearGota(yInicial) {
  const colores = PALETA[Math.floor(Math.random() * PALETA.length)];
  return {
    y: yInicial,
    frase: elegirFrase(),
    indice: 0,
    velocidad: 0.55 + Math.random() * 0.85,   // columnas con ritmo propio
    acumulado: 0,
    colores: colores,
    largoCola: 9 + Math.floor(Math.random() * 9), // longitud de la estela
    parpadeo: Math.random() * Math.PI * 2
  };
}

function inicializarColumnas() {
  const columnas = Math.floor(canvas.width / espacioColumnas);
  gotas = [];
  for (let i = 0; i < columnas; i++) {
    gotas.push(crearGota(Math.floor(Math.random() * -30)));
  }
}

ajustarTamano();
window.addEventListener("resize", ajustarTamano);

let frame = 0;

function dibujar() {
  frame++;

  // estela negra semitransparente con leve tinte cálido (deja rastro, más cinematográfico)
  ctx.fillStyle = "rgba(5, 2, 0, 0.10)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.font = "600 " + tamanoFuente + "px 'Segoe UI', system-ui, monospace";
  ctx.textAlign = "center";

  for (let i = 0; i < gotas.length; i++) {
    const gota = gotas[i];
    const x = i * espacioColumnas + tamanoFuente;

    gota.acumulado += gota.velocidad;
    if (gota.acumulado < 1) {
      // todavía no avanza esta vuelta — pero igual dibujamos su estado actual
    } else {
      gota.acumulado = 0;
      gota.indice++;
      if (gota.indice >= gota.frase.length) {
        gota.indice = 0;
      }
      gota.y++;
    }

    const yPix = gota.y * tamanoFuente;

    // --- dibuja la cola (caracteres previos con opacidad decreciente) ---
    for (let c = gota.largoCola; c >= 1; c--) {
      const yColaPix = yPix - c * tamanoFuente;
      if (yColaPix < -tamanoFuente || yColaPix > canvas.height + tamanoFuente) continue;

      let idxCola = gota.indice - c;
      // recorrido circular dentro de la frase
      idxCola = ((idxCola % gota.frase.length) + gota.frase.length) % gota.frase.length;
      let letraCola = gota.frase[idxCola];
      if (letraCola === " ") continue;

      const opacidad = Math.max(0, 1 - c / gota.largoCola) * 0.85;
      ctx.fillStyle = `rgba(${gota.colores.cola}, ${opacidad.toFixed(3)})`;
      ctx.shadowBlur = 0;
      ctx.fillText(letraCola, x, yColaPix);
    }

    // --- carácter "cabeza": el más brillante, con parpadeo sutil ---
    let letra = gota.frase[gota.indice];
    if (letra !== " ") {
      const brillo = 0.75 + 0.25 * Math.sin(frame * 0.12 + gota.parpadeo);
      ctx.fillStyle = gota.colores.cabeza;
      ctx.shadowColor = `rgba(${gota.colores.cola}, ${brillo})`;
      ctx.shadowBlur = 16 * brillo;
      ctx.fillText(letra, x, yPix);
      ctx.shadowBlur = 0;
    }

    // cuando la columna sale de la pantalla, hay chance de reiniciarla arriba con frase nueva
    if (yPix > canvas.height + gota.largoCola * tamanoFuente && Math.random() > 0.975) {
      const colores = PALETA[Math.floor(Math.random() * PALETA.length)];
      gota.y = 0;
      gota.frase = elegirFrase();
      gota.indice = 0;
      gota.velocidad = 0.55 + Math.random() * 0.85;
      gota.colores = colores;
      gota.largoCola = 9 + Math.floor(Math.random() * 9);
      gota.parpadeo = Math.random() * Math.PI * 2;
    }
  }
}

setInterval(dibujar, 40);
</script>

</body>
</html>

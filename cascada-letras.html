<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cascada de letras</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000000;
    overflow: hidden;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<canvas id="cascada"></canvas>

<script>
/* =======================================================
   👉 PON AQUÍ TUS LETRAS / PALABRAS 👈
   Puedes escribir letras sueltas ("A","B","C")
   o frases completas ("JHANNARA MI VIDA", "JHANNARA TE AMO").
   El programa elige una al azar para cada columna.
======================================================= */
const SIMBOLOS = [
  " JHANNARA MI VIDA",
  " JHANNARA MI AMOR",
  " JHANNARA MI CIELO",
  " JHANNARA MI TODO",
  " JHANNARA MI CORAZON",
  " JHANNARA TE AMO"
];

/* ======================================================= */

const canvas = document.getElementById("cascada");
const ctx = canvas.getContext("2d");

function ajustarTamano() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
ajustarTamano();
window.addEventListener("resize", ajustarTamano);

const tamanoFuente = 22;
const espacioColumnas = 32;
let columnas = Math.floor(canvas.width / espacioColumnas);

// Cada columna guarda: en qué fila va (y), qué frase le tocó,
// y en qué letra de esa frase está actualmente.
let gotas = [];

function elegirFrase() {
  return SIMBOLOS[Math.floor(Math.random() * SIMBOLOS.length)];
}

for (let i = 0; i < columnas; i++) {
  gotas.push({
    y: Math.floor(Math.random() * -20), // arranques escalonados
    frase: elegirFrase(),
    indice: 0
  });
}

function dibujar() {
  // estela negra semitransparente (deja rastro)
  ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.font = tamanoFuente + "px monospace";
  ctx.textAlign = "center";

  for (let i = 0; i < gotas.length; i++) {
    const gota = gotas[i];
    const x = i * espacioColumnas + tamanoFuente;
    const yPix = gota.y * tamanoFuente;

    // toma la letra actual de la frase (ignora espacios para que no se vean huecos raros)
    let letra = gota.frase[gota.indice];
    if (letra === " ") {
      letra = "";
    }

    // carácter "cabeza" más brillante
    ctx.fillStyle = "#FFEE00";
    ctx.shadowColor = "#FFD700";
    ctx.shadowBlur = 8;
    ctx.fillText(letra, x, yPix);
    ctx.shadowBlur = 0;

    // avanza a la siguiente letra de la frase
    gota.indice++;
    if (gota.indice >= gota.frase.length) {
      gota.indice = 0; // cuando termina la frase, vuelve a empezar (repite en bucle)
    }

    gota.y++;

    // cuando la columna sale de la pantalla, hay chance de reiniciarla arriba con frase nueva
    if (yPix > canvas.height && Math.random() > 0.975) {
      gota.y = 0;
      gota.frase = elegirFrase();
      gota.indice = 0;
    }
  }
}

setInterval(dibujar, 45);
</script>

</body>
</html>
